  </div>
  <div id="canvas-wrap">
    <canvas id="gc" height="160"></canvas>
    <div id="overlay">
      <div class="msg" id="msg">PRESS SPACE / TAP</div>

  </div>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const msgEl = document.getElementById('msg');
const subEl = document.getElementById('sub');
const scoreEl = document.getElementById('score-box');
const hiEl = document.getElementById('hi-score');

const W = 700, H = 160;
canvas.width = W; canvas.height = H;

const GND = 130;
const GRAVITY = 0.6;
const JUMP_V = -13;
let speed = 5, score = 0, hiScore = 0, frame = 0;
let state = 'idle';

const dino = { x: 70, y: GND, w: 22, h: 30, vy: 0, onGround: true, ducking: false, legFrame: 0 };
let obstacles = [], clouds = [], stars = [];

function initStars() {
  stars = Array.from({length: 40}, () => ({
    x: Math.random() * W, y: Math.random() * (GND - 30),
    r: Math.random() < 0.3 ? 1.5 : 1, alpha: 0.2 + Math.random() * 0.5
  }));
}
initStars();

function initClouds() {
  clouds = Array.from({length: 5}, (_, i) => ({
    x: 100 + i * 140 + Math.random() * 60,
    y: 20 + Math.random() * 40, w: 40 + Math.random() * 40
  }));
}
initClouds();

function reset() {
  dino.y = GND; dino.vy = 0; dino.onGround = true; dino.ducking = false; dino.h = 30;
  obstacles = []; speed = 5; score = 0; frame = 0;
  initClouds();
}

function jump() {
  if (!dino.onGround) return;
  dino.vy = JUMP_V; dino.onGround = false; dino.ducking = false; dino.h = 30;
}

function duck(on) {
  if (!dino.onGround) return;
  dino.ducking = on; dino.h = on ? 16 : 30; dino.y = on ? GND + 14 : GND;
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (state === 'idle' || state === 'dead') { startGame(); return; }
    jump();
  }
  if (e.key === 'ArrowDown') { e.preventDefault(); duck(true); }
});
document.addEventListener('keyup', e => { if (e.key === 'ArrowDown') duck(false); });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'idle' || state === 'dead') { startGame(); return; }
  const ty = e.touches[0].clientY;
  const rect = canvas.getBoundingClientRect();
  if ((ty - rect.top) / rect.height > 0.6) duck(true); else jump();
}, { passive: false });
canvas.addEventListener('touchend', () => duck(false), { passive: true });

function startGame() { reset(); state = 'running'; overlay.style.display = 'none'; }

function spawnObstacle() {
  const type = Math.random();
  if (type < 0.55) {
    const n = Math.floor(1 + Math.random() * 3);
    obstacles.push({ x: W + 10, type: 'cactus', count: n, w: n * 16, h: 38 + Math.random() * 16 });
  } else {
    obstacles.push({ x: W + 10, type: 'bird', w: 28, h: 16, y: GND - 28 - Math.random() * 48, flap: 0 });
  }
}

function drawPixelDino() {
  const x = dino.x, y = dino.y, dk = dino.ducking;
  ctx.fillStyle = '#ccc';
  if (dk) {
    ctx.fillRect(x - 2, y - 2, 26, 10);
    ctx.fillRect(x + 12, y - 10, 8, 8);
    ctx.fillRect(x + 17, y - 12, 3, 3);
    ctx.fillStyle = '#0f0f0f'; ctx.fillRect(x + 18, y - 11, 1, 1);
    ctx.fillStyle = '#ccc';
    const lf = Math.floor(dino.legFrame / 8) % 2;
    ctx.fillRect(x + 2, y + 8, 5, lf === 0 ? 5 : 3);
    ctx.fillRect(x + 14, y + 8, 5, lf === 0 ? 3 : 5);
  } else {
    ctx.fillRect(x, y - 28, 18, 14);
    ctx.fillRect(x + 4, y - 32, 12, 8);
    ctx.fillRect(x + 14, y - 26, 6, 4);
    ctx.fillStyle = '#0f0f0f'; ctx.fillRect(x + 16, y - 28, 2, 2);
    ctx.fillStyle = '#ccc';
    ctx.fillRect(x, y - 16, 18, 16);
    if (dino.onGround) {
      const lf = Math.floor(dino.legFrame / 8) % 2;
      ctx.fillRect(x + 2, y, 5, lf === 0 ? 8 : 5);
      ctx.fillRect(x + 10, y, 5, lf === 0 ? 5 : 8);
    } else {
      ctx.fillRect(x + 2, y, 5, 6); ctx.fillRect(x + 10, y, 5, 6);
    }
  }
}

function drawCactus(o) {
  ctx.fillStyle = '#4a4a4a';
  for (let i = 0; i < o.count; i++) {
    const tx = o.x + i * 8;
    ctx.fillRect(tx, GND - o.h, 10, o.h);
    if (i === 0 || i === o.count - 1) {
      ctx.fillRect(tx - 6, GND - o.h * 0.65, 6, 8);
      ctx.fillRect(tx - 6, GND - o.h * 0.65 - 8, 10, 5);
    }
  }
}

function drawBird(o) {
  ctx.fillStyle = '#4a4a4a';
  const flap = Math.floor(o.flap / 10) % 2;
  ctx.fillRect(o.x, o.y, 28, 8);
  if (flap === 0) ctx.fillRect(o.x + 4, o.y - 7, 16, 7);
  else ctx.fillRect(o.x + 4, o.y + 8, 16, 7);
  ctx.fillRect(o.x + 24, o.y + 1, 8, 4);
  ctx.fillStyle = '#0f0f0f'; ctx.fillRect(o.x + 26, o.y + 2, 2, 2);
}

function hitTest(o) {
  const dx = dino.x, dy = dino.y - (dino.ducking ? 16 : 28);
  const dw = 16, dh = dino.ducking ? 16 : 28;
  const ox = o.x + 4, ow = o.w - 8;
  const oy = o.type === 'cactus' ? GND - o.h : o.y, oh = o.h;
  return dx < ox + ow && dx + dw > ox && dy < oy + oh && dy + dh > oy;
}

function drawCloud(c) {
  ctx.fillStyle = '#1e1e1e';
  ctx.fillRect(c.x, c.y, c.w, 12);
  ctx.fillRect(c.x + 8, c.y - 7, c.w - 16, 7);
  ctx.fillRect(c.x + c.w * 0.4, c.y - 12, c.w * 0.3, 12);
}

function drawGround() {
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GND + 8); ctx.lineTo(W, GND + 8); ctx.stroke();
  ctx.fillStyle = '#222';
  for (let i = 0; i < 12; i++) {
    const rx = ((frame * speed * 0.5) + i * 62) % W;
    ctx.fillRect(rx, GND + 10, 20 + (i % 3) * 10, 2);
    ctx.fillRect(rx + 35, GND + 14, 8, 1);
  }
}

function fmtScore(n) { return String(Math.floor(n)).padStart(5, '0'); }

let nextObstacle = 80, scoreFlash = 0;

function update() {
  if (state !== 'running') return;
  frame++;
  if (dino.onGround) dino.legFrame++;
  dino.vy += GRAVITY; dino.y += dino.vy;
  if (dino.y >= (dino.ducking ? GND + 14 : GND)) {
    dino.y = dino.ducking ? GND + 14 : GND;
    dino.vy = 0; dino.onGround = true;
  }
  score += speed * 0.02;
  speed = 5 + Math.floor(score / 200) * 0.4;
  if (Math.floor(score) % 100 === 0 && Math.floor(score) > 0) scoreFlash = 20;
  scoreEl.textContent = fmtScore(score);
  if (score > hiScore) hiScore = score;
  hiEl.textContent = 'HI ' + fmtScore(hiScore);
  clouds.forEach(c => { c.x -= speed * 0.3; if (c.x < -80) { c.x = W + 10; c.y = 15 + Math.random() * 40; c.w = 40 + Math.random() * 40; } });
  nextObstacle--;
  if (nextObstacle <= 0) { spawnObstacle(); nextObstacle = Math.floor(60 + Math.random() * 80 - Math.min(score / 60, 30)); }
  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= speed;
    if (obstacles[i].type === 'bird') obstacles[i].flap++;
    if (obstacles[i].x < -50) { obstacles.splice(i, 1); continue; }
    if (hitTest(obstacles[i])) { die(); return; }
  }
}

function die() {
  state = 'dead';
  msgEl.textContent = 'GAME OVER';
  subEl.textContent = 'PRESS SPACE / TAP TO RESTART';
  overlay.style.display = 'flex';
}

function draw() {
  ctx.fillStyle = '#0f0f0f'; ctx.fillRect(0, 0, W, H);
  stars.forEach(s => {
    ctx.globalAlpha = s.alpha * (0.5 + 0.5 * Math.sin(frame * 0.02 + s.x));
    ctx.fillStyle = '#aaa'; ctx.fillRect(s.x, s.y, s.r, s.r);
  });
  ctx.globalAlpha = 1;
  clouds.forEach(drawCloud);
  drawGround();
  obstacles.forEach(o => o.type === 'cactus' ? drawCactus(o) : drawBird(o));
  drawPixelDino();
  if (scoreFlash > 0) {
    ctx.fillStyle = scoreFlash % 4 < 2 ? '#fff' : '#0f0f0f';
    ctx.font = 'bold 13px Courier New';
    ctx.fillText(fmtScore(score), W - 80, 24);
    scoreFlash--;
  }
  if (state === 'dead') {
    ctx.fillStyle = '#333'; ctx.fillRect(dino.x - 2, dino.y - 30, 22, 22);
    ctx.fillStyle = '#666'; ctx.font = '10px Courier New';
    ctx.fillText('X', dino.x + 14, dino.y - 24);
    ctx.fillText('X', dino.x + 6, dino.y - 24);
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
