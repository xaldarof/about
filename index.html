<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no">
  <title>Temur Xoldarov</title>

  <style>
    html {
      overflow: hidden;
      height: 100%;
    }

    body {
      height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #ffffff;
      cursor: none;
    }

    #canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    a {
      color: #333;
    }

    .name a {
      text-decoration: none;
      color: #111;
    }

    .bio {
      padding: 25px;
      text-align: right;
      color: #111;
    }

    .name {
      font-weight: bold;
      font-size: 32pt;
      color: #111;
    }

    .links {
      padding: 5px 0;
    }

    .link {
      padding: 0px 25px;
      text-align: right;
    }

    .link img {
      height: 24px;
      padding: 0px 5px;
      filter: invert(1);
    }

    .link a {
      text-decoration: none;
      color: #111;
    }

    .card {
      position: relative;
      z-index: 10;
      pointer-events: all;
    }

    /* custom cursor */
    #cursor {
      position: fixed;
      width: 12px;
      height: 12px;
      border: 1.5px solid rgba(0,0,0,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, width 0.2s, height 0.2s;
    }
    #cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(0,0,0,0.18);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.08s linear, left 0.12s ease-out, top 0.12s ease-out;
    }
  </style>
</head>

<body>

<canvas id="canvas"></canvas>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<div class="card">
  <div class="bio">
    <div class="name">
      <a href="./">Temur Xoldarov</a>
    </div>
  </div>

  <div class="links">
    <div class='link'>
      <a href="https://t.me/xaldarof">
        <img alt='Telegram' src='telegram.png'>
      </a>
      <a href="https://github.com/xaldarof">
        <img alt='GitHub' src='GitHub_Logo_White.png'>
      </a>
      <a href="https://uz.linkedin.com/in/temur-xoldarov-37067b230">
        <img alt='LinkedIn' src='In-White-41px-TM.png'>
      </a>
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  const cursorEl     = document.getElementById('cursor');
  const cursorRingEl = document.getElementById('cursor-ring');

  let W, H;
  const mouse = { x: -999, y: -999, down: false };

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); init(); });

  // ── Mouse tracking ──────────────────────────────
  window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    cursorEl.style.left     = e.clientX + 'px';
    cursorEl.style.top      = e.clientY + 'px';
    cursorRingEl.style.left = e.clientX + 'px';
    cursorRingEl.style.top  = e.clientY + 'px';
  });
  window.addEventListener('mousedown', () => { mouse.down = true;  cursorEl.style.transform = 'translate(-50%,-50%) scale(1.8)'; });
  window.addEventListener('mouseup',   () => { mouse.down = false; cursorEl.style.transform = 'translate(-50%,-50%) scale(1)'; });

  // ── Touch support ───────────────────────────────
  window.addEventListener('touchmove', e => {
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
  }, { passive: true });

  // ── Physics constants ───────────────────────────
  const GRAVITY       = 0.018;   // pulls DOWN (fighting the float)
  const ANTIGRAVITY   = -0.032;  // net upward force (antigravity wins slightly)
  const DRAG          = 0.995;   // air resistance
  const MOUSE_RADIUS  = 120;     // influence radius
  const MOUSE_FORCE   = 0.35;    // push strength
  const BOUNCE        = 0.55;    // energy kept on wall bounce
  const SPAWN_RATE    = 3;       // new particles per frame when settled

  // ── Shades ──────────────────────────────────────
  const SHADES = [
    [0,   0,   0],
    [40,  40,  40],
    [80,  80,  80],
    [120, 120, 120],
    [160, 160, 160],
  ];

  class Particle {
    constructor(x, y, fromBottom) {
      if (fromBottom) {
        this.x  = Math.random() * W;
        this.y  = H + Math.random() * 60;
        this.vx = (Math.random() - 0.5) * 1.2;
        this.vy = -(0.5 + Math.random() * 2.5);  // initial upward burst
      } else {
        this.x  = x !== undefined ? x : Math.random() * W;
        this.y  = y !== undefined ? y : Math.random() * H;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
      }

      // dash properties
      this.len   = 5 + Math.random() * 12;
      this.thick = 0.8 + Math.random() * 1.8;
      this.isDot = Math.random() < 0.22;

      const s     = SHADES[Math.floor(Math.random() * SHADES.length)];
      this.alpha  = 0.25 + Math.random() * 0.75;
      this.r = s[0]; this.g = s[1]; this.b = s[2];

      // rotation
      this.angle  = Math.random() * Math.PI * 2;
      this.spin   = (Math.random() - 0.5) * 0.04;

      // each particle has slightly different buoyancy
      this.buoyancy = ANTIGRAVITY - Math.random() * 0.01;

      // trail
      this.trail  = [];
      this.maxTrail = this.isDot ? 0 : Math.floor(2 + Math.random() * 4);

      this.dead = false;
    }

    update() {
      // store trail
      if (this.maxTrail > 0) {
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > this.maxTrail) this.trail.shift();
      }

      // net vertical force: antigravity + gravity = slight upward drift
      this.vy += this.buoyancy + GRAVITY;  // buoyancy dominates
      this.vx *= DRAG;
      this.vy *= DRAG;

      // mouse interaction — repel or attract
      const dx   = this.x - mouse.x;
      const dy   = this.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < MOUSE_RADIUS && dist > 0.5) {
        const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS;
        const f     = force * force * MOUSE_FORCE * (mouse.down ? -2.5 : 1);
        this.vx += (dx / dist) * f;
        this.vy += (dy / dist) * f;
      }

      this.x     += this.vx;
      this.y     += this.vy;
      this.angle += this.spin;

      // wall collisions with bounce
      if (this.x < 0)  { this.x = 0;  this.vx = Math.abs(this.vx) * BOUNCE; }
      if (this.x > W)  { this.x = W;  this.vx = -Math.abs(this.vx) * BOUNCE; }
      if (this.y > H)  { this.y = H;  this.vy = -Math.abs(this.vy) * BOUNCE; }

      // remove if floated far off top
      if (this.y < -80) this.dead = true;
    }

    draw() {
      const col = `rgba(${this.r},${this.g},${this.b},${this.alpha})`;

      // draw trail
      if (this.trail.length > 1) {
        for (let i = 1; i < this.trail.length; i++) {
          const ta = (i / this.trail.length) * this.alpha * 0.4;
          ctx.save();
          ctx.strokeStyle = `rgba(${this.r},${this.g},${this.b},${ta})`;
          ctx.lineWidth   = this.thick * 0.5;
          ctx.lineCap     = 'round';
          ctx.beginPath();
          ctx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
          ctx.lineTo(this.trail[i].x,   this.trail[i].y);
          ctx.stroke();
          ctx.restore();
        }
      }

      ctx.save();
      ctx.strokeStyle = col;
      ctx.fillStyle   = col;
      ctx.lineWidth   = this.thick;
      ctx.lineCap     = 'round';
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);

      if (this.isDot) {
        ctx.beginPath();
        ctx.arc(0, 0, this.thick * 0.9, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.moveTo(0, -this.len / 2);
        ctx.lineTo(0,  this.len / 2);
        ctx.stroke();
      }

      ctx.restore();
    }
  }

  let particles = [];
  let frame = 0;

  function init() {
    particles = Array.from(
            { length: Math.max(150, Math.min(500, Math.round((W * H) / 3000))) },
            () => new Particle(undefined, undefined, true)
    );
    // scatter some mid-air too
    for (let i = 0; i < particles.length * 0.6; i++) {
      particles[i].x = Math.random() * W;
      particles[i].y = Math.random() * H;
      particles[i].vy = -(Math.random() * 1.5);
    }
  }
  init();

  function loop() {
    frame++;

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    // spawn fresh particles from bottom
    if (frame % 4 === 0 && particles.length < 600) {
      for (let i = 0; i < SPAWN_RATE; i++) {
        particles.push(new Particle(undefined, undefined, true));
      }
    }

    // update & draw
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      particles[i].draw();
      if (particles[i].dead) particles.splice(i, 1);
    }

    requestAnimationFrame(loop);
  }
  loop();

  // click — burst of particles from cursor
  window.addEventListener('click', e => {
    for (let i = 0; i < 18; i++) {
      const p = new Particle(e.clientX, e.clientY, false);
      p.vx = (Math.random() - 0.5) * 6;
      p.vy = -(1 + Math.random() * 5);
      particles.push(p);
    }
  });
</script>

</body>
</html>
