<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no">
  <title>Temur Xoldarov</title>
  <style>
    html {
      overflow: hidden;
      height: 100%;
    }

    body {
      height: 100%;
      background-color: black;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-image: url(background.jpg);
      background-repeat: no-repeat;
      background-position: center top;
      background-size: cover;
    }

    .photograph-credit {
      position: absolute;
      right: 0;
      bottom: 0;
      padding: 3px;
      font-size: 8pt;
      color: #AAA;
    }

    .photograph-credit a {
      color: #AAA;
    }

    a {
      color: #333;
    }

    .name a {
      text-decoration: none;
      color: lightgray;
    }

    .bio {
      padding: 25px;
      text-align: right;
      color: lightgray;
    }

    .name {
      font-weight: bold;
      font-size: 32pt;
      color: lightgray;
    }

    .links {
      padding: 5px 0;
      color: lightgray;
    }

    .link {
      padding: 0px 25px;
      text-align: right;
      color: lightgray;
    }

    .link img {
      height: 24px;
      padding: 0px 5px;
      color: lightgray;
    }

    .link a {
      text-decoration: none;
      color: lightgray;
    }
  </style>
</head>

<body>
<div class="card">
  <div class="bio">
    <div class="name">
      <a href="./">Temur Xoldarov</a>
    </div>
  </div>

  <div class="links">
    <div class='link'>
      <a href="https://t.me/xaldarof">
        <img alt='Telegram' src='telegram.png'>
      </a>
      <a href="https://github.com/xaldarof">
        <img alt='GitHub' src='GitHub_Logo_White.png'>
      </a>
      <a href="https://uz.linkedin.com/in/temur-xoldarov-37067b230">
        <img alt='LinkedIn' src='In-White-41px-TM.png'>
      </a>
    </div>
  </div>
</div>
</body>

</html>
