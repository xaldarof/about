
<style>

    display: flex; flex-direction: column;

  #links a:hover { color: #bbb; border-color: #555; }

    </div>
    <div id="canvas-wrap">
      <canvas id="gc"></canvas>
      <div id="overlay">
        <div class="msg" id="msg">PRESS SPACE / TAP</div>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const msgEl = document.getElementById('msg');
const subEl = document.getElementById('sub');
const scoreEl = document.getElementById('score-box');
const hiEl = document.getElementById('hi-score');

const W = 900, H = 260;
canvas.width = W; canvas.height = H;

const GND = 210, GRAVITY = 0.6, JUMP_V = -15;
let speed = 5, score = 0, hiScore = 0, frame = 0, state = 'idle';

const dino = { x: 90, y: GND, vy: 0, onGround: true, ducking: false, legFrame: 0 };
let obstacles = [], clouds = [], stars = [];

function initStars() {
  stars = Array.from({length: 55}, () => ({
    x: Math.random() * W, y: Math.random() * (GND - 40),
    r: Math.random() < 0.3 ? 2 : 1, alpha: 0.2 + Math.random() * 0.5
  }));
}
initStars();

function initClouds() {
  clouds = Array.from({length: 6}, (_, i) => ({
    x: 80 + i * 160 + Math.random() * 60, y: 24 + Math.random() * 55, w: 55 + Math.random() * 55
  }));
}
initClouds();

function reset() {
  dino.y = GND; dino.vy = 0; dino.onGround = true; dino.ducking = false;
  obstacles = []; speed = 5; score = 0; frame = 0; initClouds();
}

function jump() { if (!dino.onGround) return; dino.vy = JUMP_V; dino.onGround = false; dino.ducking = false; }
function duck(on) { if (!dino.onGround) return; dino.ducking = on; dino.y = on ? GND + 18 : GND; }

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.key === 'ArrowUp') { e.preventDefault(); if (state === 'idle' || state === 'dead') { startGame(); return; } jump(); }
  if (e.key === 'ArrowDown') { e.preventDefault(); duck(true); }
});
document.addEventListener('keyup', e => { if (e.key === 'ArrowDown') duck(false); });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'idle' || state === 'dead') { startGame(); return; }
  const rect = canvas.getBoundingClientRect();
  if ((e.touches[0].clientY - rect.top) / rect.height > 0.6) duck(true); else jump();
}, { passive: false });
canvas.addEventListener('touchend', () => duck(false), { passive: true });

function startGame() { reset(); state = 'running'; overlay.style.display = 'none'; }

function spawnObstacle() {
  if (Math.random() < 0.55) {
    const n = Math.floor(1 + Math.random() * 3);
    obstacles.push({ x: W + 10, type: 'cactus', count: n, w: n * 20, h: 50 + Math.random() * 24 });
  } else {
    obstacles.push({ x: W + 10, type: 'bird', w: 36, h: 20, y: GND - 36 - Math.random() * 64, flap: 0 });
  }
}

function drawPixelDino() {
  const x = dino.x, y = dino.y, dk = dino.ducking;
  const S = 1.4;
  ctx.fillStyle = '#ccc';
  if (dk) {
    ctx.fillRect(x - 3, y - 3, 33*S|0, 13*S|0);
    ctx.fillRect(x + 15*S|0, y - 13*S|0, 10*S|0, 10*S|0);
    ctx.fillRect(x + 21*S|0, y - 16*S|0, 4*S|0, 4*S|0);
    ctx.fillStyle = '#0f0f0f'; ctx.fillRect(x + 23*S|0, y - 14*S|0, 2, 2);
    ctx.fillStyle = '#ccc';
    const lf = Math.floor(dino.legFrame / 8) % 2;
    ctx.fillRect(x + 3*S|0, y + 10*S|0, 7*S|0, lf === 0 ? 7 : 4);
    ctx.fillRect(x + 18*S|0, y + 10*S|0, 7*S|0, lf === 0 ? 4 : 7);
  } else {
    ctx.fillRect(x, y - 39, 25, 20);
    ctx.fillRect(x + 6, y - 46, 17, 12);
    ctx.fillRect(x + 20, y - 37, 9, 6);
    ctx.fillStyle = '#0f0f0f'; ctx.fillRect(x + 23, y - 40, 3, 3);
    ctx.fillStyle = '#ccc';
    ctx.fillRect(x, y - 22, 25, 22);
    if (dino.onGround) {
      const lf = Math.floor(dino.legFrame / 8) % 2;
      ctx.fillRect(x + 3, y, 7, lf === 0 ? 11 : 7);
      ctx.fillRect(x + 14, y, 7, lf === 0 ? 7 : 11);
    } else { ctx.fillRect(x + 3, y, 7, 8); ctx.fillRect(x + 14, y, 7, 8); }
  }
}

function drawCactus(o) {
  ctx.fillStyle = '#4a4a4a';
  for (let i = 0; i < o.count; i++) {
    const tx = o.x + i * 11;
    ctx.fillRect(tx, GND - o.h, 13, o.h);
    if (i === 0 || i === o.count - 1) {
      ctx.fillRect(tx - 8, GND - o.h * 0.65, 8, 11); ctx.fillRect(tx - 8, GND - o.h * 0.65 - 11, 14, 7);
    }
  }
}

function drawBird(o) {
  ctx.fillStyle = '#4a4a4a';
  const flap = Math.floor(o.flap / 10) % 2;
  ctx.fillRect(o.x, o.y, 36, 11);
  if (flap === 0) ctx.fillRect(o.x + 5, o.y - 10, 20, 10); else ctx.fillRect(o.x + 5, o.y + 11, 20, 10);
  ctx.fillRect(o.x + 31, o.y + 2, 10, 5);
  ctx.fillStyle = '#0f0f0f'; ctx.fillRect(o.x + 34, o.y + 3, 2, 2);
}

function hitTest(o) {
  const dx = dino.x, dy = dino.y - (dino.ducking ? 20 : 39), dw = 20, dh = dino.ducking ? 20 : 39;
  const ox = o.x + 5, ow = o.w - 10, oy = o.type === 'cactus' ? GND - o.h : o.y, oh = o.h;
  return dx < ox + ow && dx + dw > ox && dy < oy + oh && dy + dh > oy;
}

function drawCloud(c) {
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(c.x, c.y, c.w, 16); ctx.fillRect(c.x + 10, c.y - 9, c.w - 20, 10); ctx.fillRect(c.x + c.w * 0.35, c.y - 16, c.w * 0.3, 16);
}

function drawGround() {
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GND + 10); ctx.lineTo(W, GND + 10); ctx.stroke();
  ctx.fillStyle = '#1e1e1e';
  for (let i = 0; i < 14; i++) {
    const rx = ((frame * speed * 0.5) + i * 70) % W;
    ctx.fillRect(rx, GND + 13, 28 + (i % 3) * 12, 3); ctx.fillRect(rx + 40, GND + 18, 10, 2);
  }
}

function fmtScore(n) { return String(Math.floor(n)).padStart(5, '0'); }

let nextObstacle = 90, scoreFlash = 0;

function update() {
  if (state !== 'running') return;
  frame++; if (dino.onGround) dino.legFrame++;
  dino.vy += GRAVITY; dino.y += dino.vy;
  const groundY = dino.ducking ? GND + 18 : GND;
  if (dino.y >= groundY) { dino.y = groundY; dino.vy = 0; dino.onGround = true; }
  score += speed * 0.02; speed = 5 + Math.floor(score / 200) * 0.4;
  if (Math.floor(score) % 100 === 0 && Math.floor(score) > 0) scoreFlash = 20;
  scoreEl.textContent = fmtScore(score);
  if (score > hiScore) hiScore = score;
  hiEl.textContent = 'HI ' + fmtScore(hiScore);
  clouds.forEach(c => { c.x -= speed * 0.3; if (c.x < -90) { c.x = W + 10; c.y = 18 + Math.random() * 55; c.w = 55 + Math.random() * 55; } });
  nextObstacle--;
  if (nextObstacle <= 0) { spawnObstacle(); nextObstacle = Math.floor(65 + Math.random() * 90 - Math.min(score / 60, 35)); }
  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= speed; if (obstacles[i].type === 'bird') obstacles[i].flap++;
    if (obstacles[i].x < -60) { obstacles.splice(i, 1); continue; }
    if (hitTest(obstacles[i])) { die(); return; }
  }
}

function die() { state = 'dead'; msgEl.textContent = 'GAME OVER'; subEl.textContent = 'PRESS SPACE / TAP TO RESTART'; overlay.style.display = 'flex'; }

function draw() {
  ctx.fillStyle = '#0f0f0f'; ctx.fillRect(0, 0, W, H);
  stars.forEach(s => { ctx.globalAlpha = s.alpha * (0.5 + 0.5 * Math.sin(frame * 0.02 + s.x)); ctx.fillStyle = '#aaa'; ctx.fillRect(s.x, s.y, s.r, s.r); });
  ctx.globalAlpha = 1;
  clouds.forEach(drawCloud); drawGround();
  obstacles.forEach(o => o.type === 'cactus' ? drawCactus(o) : drawBird(o));
  drawPixelDino();
  if (scoreFlash > 0) { ctx.fillStyle = scoreFlash % 4 < 2 ? '#fff' : '#0f0f0f'; ctx.font = 'bold 14px Courier New'; ctx.fillText(fmtScore(score), W - 90, 28); scoreFlash--; }
  if (state === 'dead') {
    ctx.fillStyle = '#2a2a2a'; ctx.fillRect(dino.x - 3, dino.y - 44, 30, 30);
    ctx.fillStyle = '#666'; ctx.font = 'bold 12px Courier New';
    ctx.fillText('X', dino.x + 17, dino.y - 30); ctx.fillText('X', dino.x + 7, dino.y - 30);
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
